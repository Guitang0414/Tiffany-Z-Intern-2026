# ai-news — PRODUCTION compose for Dokploy. See DEPLOY.md for the full runbook.
#
# Differs from docker-compose.yml (dev) deliberately (deployment-plan §4.1.3):
#   - no exposed ports (Traefik on dokploy-network fronts it; HTTPS at the edge)
#   - extension is built into the image (Dockerfile), not bind-mounted from source
#   - pinned patch version
#   - all secrets come from Dokploy env vars (nothing hardcoded)
#   - Authentik OIDC block ready to enable (Phase 2)

services:
  directus:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      PUBLIC_URL: ${PUBLIC_URL} # e.g. https://cms.epochtimesnw.com

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      CACHE_ENABLED: "true"
      CACHE_STORE: memory
      CACHE_AUTO_PURGE: "true"

      # Service-account role id(s) for the hooks (set AFTER permissions.mjs runs; see DEPLOY.md)
      ARTICLES_SERVICE_ROLE_IDS: ${ARTICLES_SERVICE_ROLE_IDS:-}

      # Phase 1: bootstrap admin via env. Phase 2: switch to Authentik OIDC (below) and
      # you can drop these.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      LOG_LEVEL: info

      # Force SSO-only login: disable the default email/password provider so the only way in
      # is "Log In with Authentik". Local admin password can no longer log in via the UI
      # (break-glass = container CLI `directus users passwd`, or temporarily unset this).
      # SAFE ONLY because real admins are promoted to Administrator on their Authentik accounts.
      AUTH_DISABLE_DEFAULT: "true"

      # --- Authentik OIDC (enabled) — roles assigned in Directus (Route B: no Authentik groups) ---
      AUTH_PROVIDERS: authentik
      AUTH_AUTHENTIK_DRIVER: openid
      AUTH_AUTHENTIK_CLIENT_ID: ${OIDC_CLIENT_ID}
      AUTH_AUTHENTIK_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      AUTH_AUTHENTIK_ISSUER_URL: ${OIDC_ISSUER_URL}
      AUTH_AUTHENTIK_IDENTIFIER_KEY: email
      # Route B: auto-create SSO users as the default role (editor); promote admins by hand
      # in Directus. WHO may log in is gated by Authentik's app-access policy (mentor's side).
      AUTH_AUTHENTIK_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_AUTHENTIK_DEFAULT_ROLE_ID: ${DIRECTUS_DEFAULT_ROLE_ID}
      AUTH_AUTHENTIK_SCOPE: "openid profile email"
    volumes:
      - directus_uploads:/directus/uploads
    expose:
      - "8055" # internal only; Dokploy/Traefik routes the domain to this port
    networks:
      - default
      - dokploy-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - directus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  directus_uploads:
  directus_pg_data:

networks:
  dokploy-network:
    external: true
